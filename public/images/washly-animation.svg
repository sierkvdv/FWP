<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="washlyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
    <filter id="washlyGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#washlyGradient)" opacity="0.1"/>
  
  <!-- Washing Machine -->
  <g transform="translate(100, 100)">
    <!-- Machine body -->
    <rect x="-30" y="-25" width="60" height="50" rx="8" fill="#06b6d4" filter="url(#washlyGlow)">
      <animate attributeName="y" values="-25;-27;-25" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Machine door -->
    <circle cx="0" cy="0" r="18" fill="#0891b2" stroke="#0e7490" stroke-width="3">
      <animate attributeName="r" values="18;20;18" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Water inside -->
    <circle cx="0" cy="0" r="12" fill="#06b6d4" opacity="0.6">
      <animate attributeName="r" values="12;15;12" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Clothes inside -->
    <rect x="-8" y="-5" width="4" height="8" rx="2" fill="#0e7490" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="-3" width="3" height="6" rx="1" fill="#0e7490" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" values="0 5 0;360 5 0" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-2" y="3" width="5" height="4" rx="1" fill="#0e7490" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" values="0 0 5;360 0 5" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Control panel -->
    <rect x="-25" y="-35" width="50" height="10" rx="3" fill="#0e7490">
      <animate attributeName="y" values="-35;-37;-35" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Control buttons -->
    <circle cx="-15" cy="-30" r="2" fill="#06b6d4">
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-30" r="2" fill="#0891b2">
      <animate attributeName="r" values="2;4;2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="-30" r="2" fill="#0e7490">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Water droplets -->
    <circle cx="-40" cy="-10" r="2" fill="#06b6d4" opacity="0.7">
      <animate attributeName="cy" values="-10;-20;-10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="-15" r="1" fill="#0891b2" opacity="0.6">
      <animate attributeName="cy" values="-15;-25;-15" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-35" cy="20" r="1" fill="#0e7490" opacity="0.8">
      <animate attributeName="cy" values="20;10;20" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Bubbles -->
    <circle cx="-20" cy="15" r="3" fill="#06b6d4" opacity="0.5">
      <animate attributeName="r" values="3;5;3" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="10" r="2" fill="#0891b2" opacity="0.6">
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating laundry elements -->
  <circle cx="30" cy="30" r="2" fill="#06b6d4" opacity="0.6">
    <animate attributeName="cy" values="30;10;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="50" r="3" fill="#0891b2" opacity="0.5">
    <animate attributeName="cy" values="50;30;50" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="170" r="2" fill="#0e7490" opacity="0.7">
    <animate attributeName="cy" values="170;150;170" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#06b6d4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    WASHLY
  </text>
</svg>
