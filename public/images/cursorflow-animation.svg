<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cursorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="particleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" opacity="0.1"/>
  
  <!-- Moving cursor -->
  <g id="cursor">
    <path d="M 20 20 L 20 35 L 25 30 L 20 20" fill="url(#cursorGradient)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="20" cy="20" r="2" fill="#ffffff">
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Cursor trail particles -->
  <g id="particles">
    <circle cx="50" cy="80" r="3" fill="url(#particleGradient)">
      <animate attributeName="cx" values="50;150;50" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;120;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="150" r="2" fill="url(#particleGradient)">
      <animate attributeName="cx" values="120;200;120" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;100;150" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="60" r="4" fill="url(#particleGradient)">
      <animate attributeName="cx" values="200;300;200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;200;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="200" r="2.5" fill="url(#particleGradient)">
      <animate attributeName="cx" values="300;100;300" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;50;200" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Project title -->
  <text x="200" y="280" text-anchor="middle" fill="#6366f1" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    CursorFlow
  </text>
</svg> 