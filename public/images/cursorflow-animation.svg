<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cursorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="particleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" opacity="0.1"/>
  
  <!-- Main cursor that moves around -->
  <g id="main-cursor">
    <!-- Cursor arrow -->
    <path d="M 50 50 L 50 65 L 55 60 L 50 50" fill="url(#cursorGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 300,50; 200,200; 100,100; 0,0" 
        dur="8s" repeatCount="indefinite"/>
    </path>
    <!-- Cursor glow -->
    <circle cx="50" cy="50" r="8" fill="url(#glowGradient)" opacity="0.5">
      <animate attributeName="r" values="8;12;8" dur="1.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" 
        values="0,0; 300,50; 200,200; 100,100; 0,0" 
        dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Cursor trail with multiple particles -->
  <g id="cursor-trail">
    <!-- Trail particle 1 -->
    <circle cx="50" cy="50" r="3" fill="url(#particleGradient)" opacity="0.8">
      <animate attributeName="cx" values="50;350;200;100;50" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;100;250;150;50" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8;0;0.8" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;1;3;1;3" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Trail particle 2 -->
    <circle cx="50" cy="50" r="2" fill="url(#particleGradient)" opacity="0.6">
      <animate attributeName="cx" values="50;350;200;100;50" dur="8s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="cy" values="50;100;250;150;50" dur="8s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.6;0;0.6;0;0.6" dur="8s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="r" values="2;0.5;2;0.5;2" dur="8s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    
    <!-- Trail particle 3 -->
    <circle cx="50" cy="50" r="1.5" fill="url(#particleGradient)" opacity="0.4">
      <animate attributeName="cx" values="50;350;200;100;50" dur="8s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="cy" values="50;100;250;150;50" dur="8s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.4;0;0.4;0;0.4" dur="8s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="r" values="1.5;0.3;1.5;0.3;1.5" dur="8s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
  
  <!-- Floating particles that react to cursor -->
  <g id="floating-particles">
    <circle cx="80" cy="80" r="2" fill="url(#particleGradient)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="120" r="1.5" fill="url(#particleGradient)">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;3;1.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="220" r="2.5" fill="url(#particleGradient)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2.5;5;2.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="180" r="1.8" fill="url(#particleGradient)">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;3.5;1.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Audio waveform visualization -->
  <g id="audio-waveform">
    <rect x="100" y="250" width="3" height="15" fill="url(#cursorGradient)" opacity="0.8">
      <animate attributeName="height" values="15;30;15" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="110" y="250" width="3" height="20" fill="url(#cursorGradient)" opacity="0.7">
      <animate attributeName="height" values="20;35;20" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="250" width="3" height="25" fill="url(#cursorGradient)" opacity="0.9">
      <animate attributeName="height" values="25;40;25" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="130" y="250" width="3" height="18" fill="url(#cursorGradient)" opacity="0.6">
      <animate attributeName="height" values="18;33;18" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="140" y="250" width="3" height="22" fill="url(#cursorGradient)" opacity="0.8">
      <animate attributeName="height" values="22;37;22" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="250" width="3" height="16" fill="url(#cursorGradient)" opacity="0.7">
      <animate attributeName="height" values="16;31;16" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="160" y="250" width="3" height="28" fill="url(#cursorGradient)" opacity="0.9">
      <animate attributeName="height" values="28;43;28" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="170" y="250" width="3" height="19" fill="url(#cursorGradient)" opacity="0.6">
      <animate attributeName="height" values="19;34;19" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="180" y="250" width="3" height="24" fill="url(#cursorGradient)" opacity="0.8">
      <animate attributeName="height" values="24;39;24" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="190" y="250" width="3" height="17" fill="url(#cursorGradient)" opacity="0.7">
      <animate attributeName="height" values="17;32;17" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="200" y="250" width="3" height="26" fill="url(#cursorGradient)" opacity="0.9">
      <animate attributeName="height" values="26;41;26" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="210" y="250" width="3" height="21" fill="url(#cursorGradient)" opacity="0.6">
      <animate attributeName="height" values="21;36;21" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="220" y="250" width="3" height="23" fill="url(#cursorGradient)" opacity="0.8">
      <animate attributeName="height" values="23;38;23" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="230" y="250" width="3" height="18" fill="url(#cursorGradient)" opacity="0.7">
      <animate attributeName="height" values="18;33;18" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="240" y="250" width="3" height="27" fill="url(#cursorGradient)" opacity="0.9">
      <animate attributeName="height" values="27;42;27" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="250" y="250" width="3" height="20" fill="url(#cursorGradient)" opacity="0.6">
      <animate attributeName="height" values="20;35;20" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="260" y="250" width="3" height="25" fill="url(#cursorGradient)" opacity="0.8">
      <animate attributeName="height" values="25;40;25" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="270" y="250" width="3" height="19" fill="url(#cursorGradient)" opacity="0.7">
      <animate attributeName="height" values="19;34;19" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="280" y="250" width="3" height="29" fill="url(#cursorGradient)" opacity="0.9">
      <animate attributeName="height" values="29;44;29" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="290" y="250" width="3" height="22" fill="url(#cursorGradient)" opacity="0.6">
      <animate attributeName="height" values="22;37;22" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="250" width="3" height="24" fill="url(#cursorGradient)" opacity="0.8">
      <animate attributeName="height" values="24;39;24" dur="0.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Interactive elements that respond to cursor -->
  <g id="interactive-elements">
    <!-- Glowing circle that follows cursor -->
    <circle cx="200" cy="150" r="15" fill="none" stroke="url(#cursorGradient)" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="15;25;15" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Ripple effect -->
    <circle cx="200" cy="150" r="5" fill="none" stroke="url(#cursorGradient)" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="5;40;5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Project title with glow effect -->
  <text x="200" y="280" text-anchor="middle" fill="#6366f1" font-family="Arial, sans-serif" font-size="16" font-weight="bold" filter="url(#glow)">
    CursorFlow
  </text>
</svg> 