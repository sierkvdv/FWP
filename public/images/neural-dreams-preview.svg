<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dreamGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="neuralGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" opacity="0.1"/>
  
  <!-- Neural network nodes -->
  <g id="neural-network">
    <!-- Input layer -->
    <circle cx="80" cy="80" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="120" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="160" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hidden layer -->
    <circle cx="200" cy="60" r="5" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="100" r="5" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="140" r="5" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="180" r="5" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Output layer -->
    <circle cx="320" cy="100" r="6" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="140" r="6" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connection lines with animation -->
  <g id="connections" stroke="url(#dreamGradient)" stroke-width="1" opacity="0.6">
    <!-- Input to hidden -->
    <line x1="84" y1="80" x2="195" y2="60">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="84" y1="120" x2="195" y2="100">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="84" y1="160" x2="195" y2="140">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.8s" repeatCount="indefinite"/>
    </line>
    
    <!-- Hidden to output -->
    <line x1="205" y1="60" x2="314" y2="100">
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="205" y1="100" x2="314" y2="140">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.9s" repeatCount="indefinite"/>
    </line>
    <line x1="205" y1="140" x2="314" y2="100">
      <animate attributeName="opacity" values="0.5;0.6;0.5" dur="2.7s" repeatCount="indefinite"/>
    </line>
    <line x1="205" y1="180" x2="314" y2="140">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.1s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Floating dream particles -->
  <g id="dream-particles">
    <circle cx="150" cy="50" r="2" fill="url(#dreamGradient)">
      <animate attributeName="cx" values="150;170;150" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;30;50" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="200" r="3" fill="url(#dreamGradient)">
      <animate attributeName="cx" values="250;270;250" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;220;200" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="220" r="2.5" fill="url(#dreamGradient)">
      <animate attributeName="cx" values="100;120;100" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;200;220" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Project title -->
  <text x="200" y="280" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    Neural Dreams
  </text>
</svg> 