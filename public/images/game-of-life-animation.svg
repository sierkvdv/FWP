<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lifeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <filter id="cellGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background grid -->
  <g opacity="0.2">
    <defs>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#10b981" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="200" height="200" fill="url(#grid)"/>
  </g>
  
  <!-- Conway's Game of Life cells -->
  <g transform="translate(100, 100)">
    <!-- Glider pattern -->
    <rect x="-30" y="-30" width="8" height="8" fill="#10b981" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="-30" width="8" height="8" fill="#10b981" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="-10" y="-30" width="8" height="8" fill="#10b981" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="-20" y="-20" width="8" height="8" fill="#10b981" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
    </rect>
    <rect x="-10" y="-10" width="8" height="8" fill="#10b981" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    
    <!-- Oscillator pattern -->
    <rect x="20" y="-20" width="8" height="8" fill="#059669" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="-20" width="8" height="8" fill="#059669" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="40" y="-20" width="8" height="8" fill="#059669" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1s"/>
    </rect>
    
    <!-- Still life pattern -->
    <rect x="-30" y="20" width="8" height="8" fill="#047857" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="20" width="8" height="8" fill="#047857" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="-30" y="30" width="8" height="8" fill="#047857" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="-20" y="30" width="8" height="8" fill="#047857" filter="url(#cellGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
  </g>
  
  <!-- Floating data particles -->
  <circle cx="40" cy="40" r="2" fill="#10b981" opacity="0.6">
    <animate attributeName="cy" values="40;20;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="60" r="3" fill="#059669" opacity="0.5">
    <animate attributeName="cy" values="60;40;60" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="160" r="2" fill="#047857" opacity="0.7">
    <animate attributeName="cy" values="160;140;160" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    GAME OF LIFE
  </text>
</svg>
