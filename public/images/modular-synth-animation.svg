<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="synthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="moduleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </radialGradient>
    <filter id="synthGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" opacity="0.1"/>
  
  <!-- Modular Synth Rack -->
  <g id="synth-rack">
    <!-- Main rack -->
    <rect x="80" y="100" width="240" height="120" fill="#1e293b" stroke="url(#synthGradient)" stroke-width="2" rx="4"/>
    
    <!-- Module 1 - Oscillator -->
    <g id="oscillator">
      <rect x="100" y="120" width="60" height="40" fill="#374151" stroke="url(#synthGradient)" stroke-width="1" rx="2"/>
      <text x="130" y="135" text-anchor="middle" fill="#22d3ee" font-family="Arial, sans-serif" font-size="8" font-weight="bold">OSC</text>
      <!-- Waveform display -->
      <path d="M 110 150 L 120 140 L 130 150 L 140 140 L 150 150" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </path>
      <!-- Frequency knob -->
      <circle cx="130" cy="165" r="3" fill="url(#synthGradient)">
        <animateTransform attributeName="transform" type="rotate" values="0 130 165;360 130 165" dur="4s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Module 2 - Filter -->
    <g id="filter">
      <rect x="180" y="120" width="60" height="40" fill="#374151" stroke="url(#synthGradient)" stroke-width="1" rx="2"/>
      <text x="210" y="135" text-anchor="middle" fill="#22d3ee" font-family="Arial, sans-serif" font-size="8" font-weight="bold">FILTER</text>
      <!-- Filter curve -->
      <path d="M 190 150 Q 210 140 230 150" stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <!-- Cutoff knob -->
      <circle cx="210" cy="165" r="3" fill="url(#synthGradient)">
        <animateTransform attributeName="transform" type="rotate" values="0 210 165;360 210 165" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Module 3 - Envelope -->
    <g id="envelope">
      <rect x="260" y="120" width="60" height="40" fill="#374151" stroke="url(#synthGradient)" stroke-width="1" rx="2"/>
      <text x="290" y="135" text-anchor="middle" fill="#22d3ee" font-family="Arial, sans-serif" font-size="8" font-weight="bold">ADSR</text>
      <!-- Envelope curve -->
      <path d="M 270 150 L 280 140 L 290 140 L 300 150 L 310 150" stroke="#22d3ee" stroke-width="2" fill="none" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Patch cables -->
    <g id="patch-cables" stroke="url(#synthGradient)" stroke-width="2" opacity="0.6">
      <path d="M 160 140 Q 170 130 180 140">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M 240 140 Q 250 130 260 140">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.8s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Audio visualization -->
  <g id="audio-viz">
    <rect x="100" y="180" width="4" height="15" fill="url(#synthGradient)" opacity="0.8">
      <animate attributeName="height" values="15;30;15" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="110" y="180" width="4" height="20" fill="url(#synthGradient)" opacity="0.7">
      <animate attributeName="height" values="20;35;20" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="180" width="4" height="25" fill="url(#synthGradient)" opacity="0.9">
      <animate attributeName="height" values="25;40;25" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="130" y="180" width="4" height="18" fill="url(#synthGradient)" opacity="0.6">
      <animate attributeName="height" values="18;33;18" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="140" y="180" width="4" height="22" fill="url(#synthGradient)" opacity="0.8">
      <animate attributeName="height" values="22;37;22" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="180" width="4" height="16" fill="url(#synthGradient)" opacity="0.7">
      <animate attributeName="height" values="16;31;16" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="160" y="180" width="4" height="28" fill="url(#synthGradient)" opacity="0.9">
      <animate attributeName="height" values="28;43;28" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="170" y="180" width="4" height="19" fill="url(#synthGradient)" opacity="0.6">
      <animate attributeName="height" values="19;34;19" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="180" y="180" width="4" height="24" fill="url(#synthGradient)" opacity="0.8">
      <animate attributeName="height" values="24;39;24" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="190" y="180" width="4" height="17" fill="url(#synthGradient)" opacity="0.7">
      <animate attributeName="height" values="17;32;17" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="200" y="180" width="4" height="26" fill="url(#synthGradient)" opacity="0.9">
      <animate attributeName="height" values="26;41;26" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="210" y="180" width="4" height="21" fill="url(#synthGradient)" opacity="0.6">
      <animate attributeName="height" values="21;36;21" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="220" y="180" width="4" height="23" fill="url(#synthGradient)" opacity="0.8">
      <animate attributeName="height" values="23;38;23" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="230" y="180" width="4" height="18" fill="url(#synthGradient)" opacity="0.7">
      <animate attributeName="height" values="18;33;18" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="240" y="180" width="4" height="27" fill="url(#synthGradient)" opacity="0.9">
      <animate attributeName="height" values="27;42;27" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="250" y="180" width="4" height="20" fill="url(#synthGradient)" opacity="0.6">
      <animate attributeName="height" values="20;35;20" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="260" y="180" width="4" height="25" fill="url(#synthGradient)" opacity="0.8">
      <animate attributeName="height" values="25;40;25" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="270" y="180" width="4" height="19" fill="url(#synthGradient)" opacity="0.7">
      <animate attributeName="height" values="19;34;19" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="280" y="180" width="4" height="29" fill="url(#synthGradient)" opacity="0.9">
      <animate attributeName="height" values="29;44;29" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="290" y="180" width="4" height="22" fill="url(#synthGradient)" opacity="0.6">
      <animate attributeName="height" values="22;37;22" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="180" width="4" height="24" fill="url(#synthGradient)" opacity="0.8">
      <animate attributeName="height" values="24;39;24" dur="0.3s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Floating frequency particles -->
  <g id="frequency-particles">
    <circle cx="80" cy="80" r="2" fill="url(#moduleGradient)">
      <animate attributeName="cx" values="80;320;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;220;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="100" r="1.5" fill="url(#moduleGradient)">
      <animate attributeName="cx" values="320;80;320" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;200;100" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Project title -->
  <text x="200" y="280" text-anchor="middle" fill="#06b6d4" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    Modular Synth
  </text>
</svg> 