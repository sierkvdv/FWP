<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blastGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>
    <filter id="blastGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background explosion -->
  <circle cx="100" cy="100" r="80" fill="url(#blastGradient)" opacity="0.1">
    <animate attributeName="r" values="80;90;80" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Blastfield Legends -->
  <g transform="translate(100, 100)">
    <!-- Central explosion -->
    <circle cx="0" cy="0" r="25" fill="#dc2626" filter="url(#blastGlow)">
      <animate attributeName="r" values="25;30;25" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Explosion rays -->
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#ef4444" stroke-width="4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#ef4444" stroke-width="4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#ef4444" stroke-width="4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#ef4444" stroke-width="4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
    </line>
    
    <!-- Diagonal rays -->
    <line x1="0" y1="0" x2="-28" y2="-28" stroke="#f87171" stroke-width="3" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="28" y2="-28" stroke="#f87171" stroke-width="3" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="-28" y2="28" stroke="#f87171" stroke-width="3" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="0" x2="28" y2="28" stroke="#f87171" stroke-width="3" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
    </line>
    
    <!-- Floating debris -->
    <circle cx="-35" cy="-35" r="3" fill="#dc2626" opacity="0.8">
      <animate attributeName="cy" values="-35;-45;-35" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="-35" r="2" fill="#ef4444" opacity="0.7">
      <animate attributeName="cy" values="-35;-45;-35" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-35" cy="35" r="4" fill="#f87171" opacity="0.6">
      <animate attributeName="cy" values="35;25;35" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="35" r="3" fill="#dc2626" opacity="0.9">
      <animate attributeName="cy" values="35;25;35" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Energy particles -->
    <circle cx="-20" cy="-20" r="1" fill="#fbbf24" opacity="0.9">
      <animate attributeName="r" values="1;3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="-20" r="1" fill="#fbbf24" opacity="0.8">
      <animate attributeName="r" values="1;3;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="20" r="1" fill="#fbbf24" opacity="0.7">
      <animate attributeName="r" values="1;3;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="20" r="1" fill="#fbbf24" opacity="0.6">
      <animate attributeName="r" values="1;3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating energy -->
  <circle cx="50" cy="50" r="2" fill="#dc2626" opacity="0.6">
    <animate attributeName="cy" values="50;30;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="80" r="3" fill="#ef4444" opacity="0.5">
    <animate attributeName="cy" values="80;60;80" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="150" r="2" fill="#f87171" opacity="0.7">
    <animate attributeName="cy" values="150;130;150" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    BLASTFIELD
  </text>
</svg>
