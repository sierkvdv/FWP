<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="patchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <filter id="patchGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background grid -->
  <g opacity="0.1">
    <defs>
      <pattern id="patchGrid" width="30" height="30" patternUnits="userSpaceOnUse">
        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#8b5cf6" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="200" height="200" fill="url(#patchGrid)"/>
  </g>
  
  <!-- Patch Field Interface -->
  <g transform="translate(100, 100)">
    <!-- Input nodes -->
    <circle cx="-50" cy="-30" r="12" fill="#8b5cf6" filter="url(#patchGlow)">
      <animate attributeName="r" values="12;15;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-50" cy="30" r="10" fill="#a855f7" filter="url(#patchGlow)">
      <animate attributeName="r" values="10;13;10" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Output nodes -->
    <circle cx="50" cy="-30" r="12" fill="#c084fc" filter="url(#patchGlow)">
      <animate attributeName="r" values="12;15;12" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="30" r="10" fill="#8b5cf6" filter="url(#patchGlow)">
      <animate attributeName="r" values="10;13;10" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Processing nodes -->
    <rect x="-15" y="-20" width="30" height="20" rx="5" fill="#a855f7" filter="url(#patchGlow)">
      <animate attributeName="y" values="-20;-22;-20" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-15" y="0" width="30" height="20" rx="5" fill="#c084fc" filter="url(#patchGlow)">
      <animate attributeName="y" values="0;2;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    
    <!-- Patch cables -->
    <path d="M -38 -30 Q -10 -40 10 -30" stroke="#8b5cf6" stroke-width="3" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M -38 30 Q -10 20 10 30" stroke="#a855f7" stroke-width="3" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 38 -30 Q 10 -20 -10 -30" stroke="#c084fc" stroke-width="3" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 38 30 Q 10 40 -10 30" stroke="#8b5cf6" stroke-width="3" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Data flow particles -->
    <circle cx="-30" cy="-30" r="2" fill="#8b5cf6" opacity="0.8">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath href="#patchPath1"/>
      </animateMotion>
    </circle>
    <circle cx="-30" cy="30" r="2" fill="#a855f7" opacity="0.7">
      <animateMotion dur="3.5s" repeatCount="indefinite">
        <mpath href="#patchPath2"/>
      </animateMotion>
    </circle>
    
    <!-- Hidden paths for animation -->
    <path id="patchPath1" d="M -30 -30 Q -10 -40 10 -30 Q 30 -20 30 -30" fill="none"/>
    <path id="patchPath2" d="M -30 30 Q -10 20 10 30 Q 30 40 30 30" fill="none"/>
  </g>
  
  <!-- Floating interface elements -->
  <rect x="20" y="20" width="15" height="10" rx="2" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="160" y="40" width="20" height="8" rx="2" fill="#a855f7" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <circle cx="40" cy="160" r="4" fill="#c084fc" opacity="0.7">
    <animate attributeName="r" values="4;6;4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    PATCH FIELD
  </text>
</svg>
