<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="djGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="soundGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </radialGradient>
    <filter id="djGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" opacity="0.1"/>
  
  <!-- DJ Turntable -->
  <g id="turntable">
    <!-- Base -->
    <rect x="150" y="180" width="100" height="20" fill="url(#djGradient)" rx="4"/>
    <!-- Turntable surface -->
    <circle cx="200" cy="190" r="35" fill="#1e293b" stroke="url(#djGradient)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 200 190;360 200 190" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Center hole -->
    <circle cx="200" cy="190" r="5" fill="#374151"/>
    <!-- Vinyl grooves -->
    <circle cx="200" cy="190" r="25" fill="none" stroke="#4b5563" stroke-width="1" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" values="0 200 190;360 200 190" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="190" r="20" fill="none" stroke="#4b5563" stroke-width="1" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" values="0 200 190;360 200 190" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="190" r="15" fill="none" stroke="#4b5563" stroke-width="1" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" values="0 200 190;360 200 190" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Sound Waves -->
  <g id="sound-waves">
    <!-- Left speaker -->
    <g transform="translate(80, 150)">
      <path d="M 0 0 Q 10 -20 20 0 Q 30 20 40 0" stroke="url(#djGradient)" stroke-width="2" fill="none" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 0 0 Q 15 -30 30 0 Q 45 30 60 0" stroke="url(#djGradient)" stroke-width="2" fill="none" opacity="0.6">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.2s" repeatCount="indefinite"/>
      </path>
      <path d="M 0 0 Q 20 -40 40 0 Q 60 40 80 0" stroke="url(#djGradient)" stroke-width="2" fill="none" opacity="0.4">
        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.4s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Right speaker -->
    <g transform="translate(320, 150)">
      <path d="M 0 0 Q -10 -20 -20 0 Q -30 20 -40 0" stroke="url(#djGradient)" stroke-width="2" fill="none" opacity="0.8">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.1s" repeatCount="indefinite"/>
      </path>
      <path d="M 0 0 Q -15 -30 -30 0 Q -45 30 -60 0" stroke="url(#djGradient)" stroke-width="2" fill="none" opacity="0.6">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.3s" repeatCount="indefinite"/>
      </path>
      <path d="M 0 0 Q -20 -40 -40 0 Q -60 40 -80 0" stroke="url(#djGradient)" stroke-width="2" fill="none" opacity="0.4">
        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Music Notes -->
  <g id="music-notes">
    <path d="M 120 80 L 120 100 Q 120 110 130 110 L 140 110 Q 150 110 150 100 L 150 80" fill="url(#djGradient)" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -20;0 0" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="120" cy="80" r="3" fill="url(#djGradient)" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -20;0 0" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <path d="M 280 90 L 280 110 Q 280 120 290 120 L 300 120 Q 310 120 310 110 L 310 90" fill="url(#djGradient)" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -15;0 0" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="280" cy="90" r="3" fill="url(#djGradient)" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -15;0 0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Bass frequencies -->
  <g id="bass-frequencies">
    <rect x="180" y="220" width="4" height="20" fill="url(#djGradient)" opacity="0.8">
      <animate attributeName="height" values="20;40;20" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="190" y="220" width="4" height="15" fill="url(#djGradient)" opacity="0.6">
      <animate attributeName="height" values="15;35;15" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="200" y="220" width="4" height="25" fill="url(#djGradient)" opacity="0.9">
      <animate attributeName="height" values="25;45;25" dur="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="210" y="220" width="4" height="18" fill="url(#djGradient)" opacity="0.7">
      <animate attributeName="height" values="18;38;18" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="220" y="220" width="4" height="22" fill="url(#djGradient)" opacity="0.8">
      <animate attributeName="height" values="22;42;22" dur="0.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Project title -->
  <text x="200" y="280" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    Virtual DJ Booth
  </text>
</svg> 