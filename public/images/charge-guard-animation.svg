<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chargeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde047;stop-opacity:1" />
    </linearGradient>
    <filter id="chargeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#chargeGradient)" opacity="0.1"/>
  
  <!-- Battery Device -->
  <g transform="translate(100, 100)">
    <!-- Battery body -->
    <rect x="-25" y="-15" width="50" height="30" rx="5" fill="#f59e0b" filter="url(#chargeGlow)">
      <animate attributeName="y" values="-15;-17;-15" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Battery terminals -->
    <rect x="20" y="-8" width="8" height="16" rx="2" fill="#fbbf24">
      <animate attributeName="fill" values="#fbbf24;#fde047;#fbbf24" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Battery level indicator -->
    <rect x="-20" y="-10" width="35" height="20" rx="3" fill="#fde047" opacity="0.8">
      <animate attributeName="width" values="35;40;35" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Charge level bars -->
    <rect x="-18" y="-8" width="6" height="4" rx="1" fill="#f59e0b">
      <animate attributeName="fill" values="#f59e0b;#fde047;#f59e0b" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-10" y="-8" width="6" height="4" rx="1" fill="#f59e0b">
      <animate attributeName="fill" values="#f59e0b;#fde047;#f59e0b" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="-2" y="-8" width="6" height="4" rx="1" fill="#f59e0b">
      <animate attributeName="fill" values="#f59e0b;#fde047;#f59e0b" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="6" y="-8" width="6" height="4" rx="1" fill="#f59e0b">
      <animate attributeName="fill" values="#f59e0b;#fde047;#f59e0b" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    
    <!-- Protection shield -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6">
      <animate attributeName="r" values="35;40;35" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Energy waves -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="25;30;25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#fde047" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="15;20;15" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Lightning bolts -->
    <path d="M -30 -20 L -25 -15 L -20 -20 L -15 -15 L -10 -20" stroke="#fde047" stroke-width="2" fill="none" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 30 -20 L 25 -15 L 20 -20 L 15 -15 L 10 -20" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Energy particles -->
    <circle cx="-25" cy="-25" r="2" fill="#fde047" opacity="0.8">
      <animate attributeName="r" values="2;4;2" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="-25" r="2" fill="#fbbf24" opacity="0.7">
      <animate attributeName="r" values="2;4;2" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-25" cy="25" r="2" fill="#f59e0b" opacity="0.6">
      <animate attributeName="r" values="2;4;2" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="25" r="2" fill="#fde047" opacity="0.9">
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating energy -->
  <circle cx="40" cy="40" r="2" fill="#f59e0b" opacity="0.6">
    <animate attributeName="cy" values="40;20;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="60" r="3" fill="#fbbf24" opacity="0.5">
    <animate attributeName="cy" values="60;40;60" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="160" r="2" fill="#fde047" opacity="0.7">
    <animate attributeName="cy" values="160;140;160" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    CHARGE GUARD
  </text>
</svg>
