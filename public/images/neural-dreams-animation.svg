<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dreamGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="neuralGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" opacity="0.1"/>
  
  <!-- Neural Network Nodes -->
  <g id="neural-network">
    <!-- Layer 1 -->
    <circle cx="80" cy="80" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="120" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="160" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Layer 2 -->
    <circle cx="200" cy="60" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="100" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="140" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="180" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Layer 3 -->
    <circle cx="320" cy="80" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="120" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="160" r="4" fill="url(#neuralGradient)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.0s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Neural Connections -->
  <g id="connections" stroke="url(#dreamGradient)" stroke-width="1" opacity="0.6">
    <!-- Layer 1 to 2 -->
    <line x1="84" y1="80" x2="196" y2="60">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="84" y1="80" x2="196" y2="100">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="84" y1="120" x2="196" y2="100">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="84" y1="120" x2="196" y2="140">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" repeatCount="indefinite"/>
    </line>
    <line x1="84" y1="160" x2="196" y2="140">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.9s" repeatCount="indefinite"/>
    </line>
    <line x1="84" y1="160" x2="196" y2="180">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.3s" repeatCount="indefinite"/>
    </line>
    
    <!-- Layer 2 to 3 -->
    <line x1="204" y1="60" x2="316" y2="80">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.1s" repeatCount="indefinite"/>
    </line>
    <line x1="204" y1="100" x2="316" y2="80">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.7s" repeatCount="indefinite"/>
    </line>
    <line x1="204" y1="100" x2="316" y2="120">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.4s" repeatCount="indefinite"/>
    </line>
    <line x1="204" y1="140" x2="316" y2="120">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.9s" repeatCount="indefinite"/>
    </line>
    <line x1="204" y1="140" x2="316" y2="160">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="204" y1="180" x2="316" y2="160">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.8s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Floating Dream Particles -->
  <g id="dream-particles">
    <circle cx="50" cy="50" r="2" fill="url(#dreamGradient)">
      <animate attributeName="cx" values="50;350;50" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;250;50" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="80" r="1.5" fill="url(#dreamGradient)">
      <animate attributeName="cx" values="350;50;350" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;200;80" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="250" r="2.5" fill="url(#dreamGradient)">
      <animate attributeName="cx" values="100;300;100" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;100;250" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Project title -->
  <text x="200" y="280" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    Neural Dreams
  </text>
</svg> 