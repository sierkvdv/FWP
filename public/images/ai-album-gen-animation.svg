<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#aiGradient)" opacity="0.1"/>
  
  <!-- AI Brain/Neural Network -->
  <g transform="translate(100, 100)">
    <!-- Neural nodes -->
    <circle cx="-30" cy="-20" r="8" fill="#6366f1" filter="url(#glow)">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="-20" r="6" fill="#8b5cf6" filter="url(#glow)">
      <animate attributeName="r" values="6;10;6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="20" r="7" fill="#ec4899" filter="url(#glow)">
      <animate attributeName="r" values="7;11;7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="30" r="5" fill="#06b6d4" filter="url(#glow)">
      <animate attributeName="r" values="5;9;5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="30" r="6" fill="#10b981" filter="url(#glow)">
      <animate attributeName="r" values="6;10;6" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connection lines -->
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="#6366f1" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="-30" y1="-20" x2="0" y2="20" stroke="#8b5cf6" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="30" y1="-20" x2="0" y2="20" stroke="#ec4899" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="20" x2="-20" y2="30" stroke="#06b6d4" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="20" x2="20" y2="30" stroke="#10b981" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Floating particles -->
  <circle cx="50" cy="50" r="2" fill="#6366f1" opacity="0.8">
    <animate attributeName="cy" values="50;30;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="80" r="3" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="cy" values="80;60;80" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="150" r="2" fill="#ec4899" opacity="0.7">
    <animate attributeName="cy" values="150;130;150" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- AI Text -->
  <text x="100" y="180" text-anchor="middle" fill="#6366f1" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    AI GENERATOR
  </text>
</svg>
