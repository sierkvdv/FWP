<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc6a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Main container -->
  <rect x="20" y="20" width="360" height="260" rx="8" fill="#0a0a0a" stroke="url(#accentGradient)" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" rx="8" fill="url(#accentGradient)" opacity="0.2"/>
  <text x="40" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ff88">Clonebox V2</text>
  
  <!-- Drive icons -->
  <g transform="translate(40, 80)">
    <!-- Source drive -->
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <circle cx="20" cy="30" r="8" fill="#00ff88"/>
    <text x="35" y="25" font-family="Arial, sans-serif" font-size="10" fill="#fff">Source</text>
    <text x="35" y="40" font-family="Arial, sans-serif" font-size="8" fill="#666">C: Drive</text>
    <text x="35" y="52" font-family="Arial, sans-serif" font-size="8" fill="#00ff88">512 GB</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(200, 105)">
    <path d="M0,0 L20,0 L15,-5 M20,0 L15,5" stroke="#00ff88" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Target drive -->
  <g transform="translate(220, 80)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <rect x="12" y="22" width="16" height="16" rx="2" fill="#00ff88"/>
    <text x="35" y="25" font-family="Arial, sans-serif" font-size="10" fill="#fff">Target</text>
    <text x="35" y="40" font-family="Arial, sans-serif" font-size="8" fill="#666">USB Drive</text>
    <text x="35" y="52" font-family="Arial, sans-serif" font-size="8" fill="#00ff88">32 GB</text>
  </g>
  
  <!-- Progress bar -->
  <g transform="translate(40, 160)">
    <rect x="0" y="0" width="320" height="8" rx="4" fill="#333"/>
    <rect x="0" y="0" width="240" height="8" rx="4" fill="url(#accentGradient)"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="10" fill="#00ff88">Backup Progress: 75%</text>
  </g>
  
  <!-- Status indicators -->
  <g transform="translate(40, 200)">
    <circle cx="8" cy="8" r="4" fill="#00ff88"/>
    <text x="20" y="12" font-family="Arial, sans-serif" font-size="10" fill="#fff">Real-time Progress</text>
    
    <circle cx="8" cy="28" r="4" fill="#00ff88"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="10" fill="#fff">Error Handling</text>
    
    <circle cx="8" cy="48" r="4" fill="#00ff88"/>
    <text x="20" y="52" font-family="Arial, sans-serif" font-size="10" fill="#fff">Cross-platform</text>
  </g>
  
  <!-- Tech stack -->
  <g transform="translate(200, 200)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="8" fill="#666">Electron</text>
    <text x="0" y="24" font-family="Arial, sans-serif" font-size="8" fill="#666">Node.js</text>
    <text x="0" y="36" font-family="Arial, sans-serif" font-size="8" fill="#666">TypeScript</text>
    <text x="0" y="48" font-family="Arial, sans-serif" font-size="8" fill="#666">React</text>
  </g>
  
  <!-- Glow effect -->
  <rect x="20" y="20" width="360" height="260" rx="8" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
</svg> 