<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="usbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="dataGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#0f172a" opacity="0.1"/>
  
  <!-- USB Drive -->
  <g id="usb-drive">
    <!-- USB connector -->
    <rect x="180" y="120" width="40" height="20" fill="#374151" rx="2"/>
    <rect x="175" y="125" width="5" height="10" fill="#6b7280"/>
    
    <!-- USB body -->
    <rect x="180" y="140" width="40" height="30" fill="url(#usbGradient)" rx="3"/>
    <rect x="185" y="145" width="30" height="20" fill="#ffffff" opacity="0.3" rx="2"/>
    
    <!-- Activity LED -->
    <circle cx="195" cy="155" r="2" fill="#ef4444">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Data transfer particles -->
  <g id="data-particles">
    <circle cx="220" cy="155" r="2" fill="url(#dataGradient)">
      <animate attributeName="cx" values="220;320;220" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="155" r="1.5" fill="url(#dataGradient)">
      <animate attributeName="cx" values="220;320;220" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="155" r="1" fill="url(#dataGradient)">
      <animate attributeName="cx" values="220;320;220" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Progress bar -->
  <g id="progress">
    <rect x="100" y="200" width="200" height="8" fill="#374151" rx="4"/>
    <rect x="100" y="200" width="0" height="8" fill="url(#progressGradient)" rx="4">
      <animate attributeName="width" values="0;200;0" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Binary data stream -->
  <g id="binary" font-family="monospace" font-size="10" fill="#10b981">
    <text x="100" y="230">10101010</text>
    <text x="100" y="245">11001100</text>
    <text x="100" y="260">10101010</text>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Project title -->
  <text x="200" y="280" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
    Clonebox
  </text>
</svg> 